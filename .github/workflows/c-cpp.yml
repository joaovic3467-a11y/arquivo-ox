name: CI

on:
  push:
  pull_request:

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Compilar programa
      run: gcc arquivo-ox.c -o arquivo-ox

    - name: Executar programa
      run: |
        ./arquivo-ox cleitinho.txt O O O X X X O O O
        

    - name: Compilar testes
      run: gcc test_arquivo-ox.c -o teste_arquivo-ox

    - name: Executar testes
      run: ./test_arquivo-ox
